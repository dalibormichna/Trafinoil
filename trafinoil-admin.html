<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f3d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Trafin Admin">
<title>Trafin Oil – Dispečink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gd:#0f3d0f; --gm:#1a5c1a; --gx:#2a7a2a; --ga:#4caf50; --gp:#e8f5e9;
  --am:#f59e0b; --ap:#fff8e1; --rd:#dc2626; --rp:#fee2e2; --bl:#2563eb;
  --sf:#f4f7f4; --g1:#eef2ee; --g2:#d8e4d8; --g4:#7a987a; --g8:#162016;
  --shsm:0 1px 4px rgba(0,0,0,.10); --shlg:0 8px 32px rgba(0,0,0,.18);
  --r:12px; --rl:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--sf);color:var(--g8);min-height:100vh;overflow-x:hidden}

/* PIN */
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,var(--gd) 0%,var(--gm) 50%,var(--gx) 100%);padding:32px 24px}
.pin-logo{height:48px;filter:brightness(0) invert(1);margin-bottom:6px}
#plf{display:none;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:white;letter-spacing:2px;margin-bottom:6px}
.pin-sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:34px}
.pin-card{background:white;border-radius:var(--rl);padding:28px 22px;width:100%;max-width:310px;box-shadow:var(--shlg)}
.pin-card h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;text-align:center;color:var(--gm);text-transform:uppercase;margin-bottom:4px}
.pin-card p{font-size:13px;color:var(--g4);text-align:center;margin-bottom:4px}
#pin-input{
  display:block;width:100%;padding:16px;margin:16px 0 12px;
  border:2px solid var(--g2);border-radius:10px;
  font-size:30px;text-align:center;letter-spacing:10px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gm);
  outline:none;transition:border-color .2s;background:white
}
#pin-input:focus{border-color:var(--gx)}
#pin-submit{
  display:block;width:100%;padding:14px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--gm),var(--gx));color:white;
  font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer
}
#pin-submit:active{opacity:.85}
.pin-error{text-align:center;color:var(--rd);font-size:13px;font-weight:600;margin-top:12px;min-height:18px}
@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake .35s ease}

/* HEADER */
#app{display:none;padding-bottom:80px}
header{background:linear-gradient(135deg,var(--gd),var(--gm));color:white;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.28)}
.hinner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.hlogo{height:30px;filter:brightness(0) invert(1)}
#hlfb{display:none;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:white;letter-spacing:1px}
.hright{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.htitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.hsync{font-size:11px;opacity:.65;display:flex;align-items:center;gap:4px}
.sdot{width:6px;height:6px;border-radius:50%;background:#9e9e9e;transition:background .3s}
.sdot.live{background:#4caf50;animation:sp 2s infinite}
.sdot.offline{background:var(--am)}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.3}}
#logout-btn{margin-top:3px;background:rgba(255,255,255,.14);border:none;color:white;padding:4px 10px;border-radius:6px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer}

/* TABS */
.tabs{display:flex;background:var(--gd);border-top:1px solid rgba(255,255,255,.1)}
.tabw{position:relative;flex:1}
.tab{display:block;width:100%;padding:9px 0;text-align:center;color:rgba(255,255,255,.55);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;border:none;background:none}
.tab.active{color:white;border-bottom:3px solid var(--ga);background:rgba(255,255,255,.06)}
.tab-icon{font-size:17px;display:block;margin-bottom:1px}
.tbadge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--rd);color:white;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;display:none;pointer-events:none}
.tbadge.on{display:block}

.page{display:none;padding:14px}
.page.active{display:block}
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gm);margin-bottom:10px;margin-top:20px}
.slabel:first-child{margin-top:0}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sc{background:white;border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--shsm);border:1px solid var(--g2)}
.sn{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;line-height:1}
.sl{font-size:10px;color:var(--g4);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ORDER CARD */
.ocard{background:white;border-radius:var(--r);box-shadow:var(--shsm);border:1px solid var(--g2);border-left-width:4px;margin-bottom:10px;overflow:hidden}
.ocard.pending{border-left-color:var(--am)}
.ocard.confirmed{border-left-color:var(--ga)}
.ocard.rejected{border-left-color:var(--rd)}
.new-pulse{animation:np .7s ease}
@keyframes np{0%{box-shadow:0 0 0 0 rgba(76,175,80,.5)}100%{box-shadow:0 0 0 14px rgba(76,175,80,0)}}
.ohdr{padding:12px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none}
.otype{font-size:22px;flex-shrink:0}
.oinfo{flex:1;min-width:0}
.onum{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--gm)}
.oprov{font-weight:600;font-size:14px;margin-top:1px}
.odesc{font-size:12px;color:var(--g4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ometa{font-size:11px;color:var(--g4);margin-top:2px}
.oright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.ovol{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.chev{font-size:11px;color:var(--g4);transition:transform .2s}
.ocard.expanded .chev{transform:rotate(180deg)}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700}
.sbadge.pending{background:var(--ap);color:#92400e}
.sbadge.confirmed{background:var(--gp);color:var(--gm)}
.sbadge.rejected{background:var(--rp);color:var(--rd)}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sbadge.pending .bdot{animation:pdot 1.3s infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.2}}
.odetail{display:none;padding:0 13px 13px;border-top:1px solid var(--g1)}
.ocard.expanded .odetail{display:block}
.drow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--g1);gap:8px}
.drow:last-child{border-bottom:none}
.dl{color:var(--g4);flex-shrink:0}
.dv{font-weight:600;text-align:right}
.alabel{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gm);margin:13px 0 8px}
.frow{display:flex;gap:8px;margin-bottom:8px}
.frow input,.frow select{flex:1;padding:9px 11px;border:1.5px solid var(--g2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--g8);background:white;outline:none;transition:border-color .2s}
.frow input:focus,.frow select:focus{border-color:var(--gx)}
.fnote{width:100%;padding:9px 11px;border:1.5px solid var(--g2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;background:white;outline:none;resize:none;height:60px;margin-bottom:8px;transition:border-color .2s;display:block}
.fnote:focus{border-color:var(--gx)}
.abtns{display:flex;gap:8px}
.abtn{flex:1;padding:11px 6px;border:none;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;cursor:pointer;transition:all .15s;text-align:center}
.abtn:active{transform:scale(.94)}
.abtn-ok{background:var(--ga);color:white}
.abtn-no{background:var(--rd);color:white}
.abtn-sv{background:var(--bl);color:white}

/* FILTER / SEARCH */
.fbar{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.fbtn{padding:7px 13px;border-radius:20px;border:1.5px solid var(--g2);background:white;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--g4);transition:all .18s}
.fbtn.active{background:var(--gm);color:white;border-color:var(--gm)}
.searchbar{position:relative;margin-bottom:12px}
.searchbar input{width:100%;padding:10px 13px 10px 35px;border:1.5px solid var(--g2);border-radius:var(--r);font-family:'Barlow',sans-serif;font-size:14px;background:white;outline:none;transition:border-color .2s}
.searchbar input:focus{border-color:var(--gx)}
.sicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.refbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.lref{font-size:11px;color:var(--g4)}
.refbtn{display:flex;align-items:center;gap:5px;padding:7px 12px;background:white;border:1.5px solid var(--g2);border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;color:var(--gm)}
.rspin{display:inline-block;transition:transform .5s}
.rspin.go{transform:rotate(360deg)}
.empty{text-align:center;padding:44px 20px;color:var(--g4)}
.empty .ei{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* SETTINGS */
.dchip{display:inline-flex;align-items:center;gap:5px;background:var(--gp);border:1px solid var(--ga);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600;margin:3px}
.dchip .rm{cursor:pointer;color:var(--rd);font-size:14px;font-weight:700}
.dwrap{display:flex;flex-wrap:wrap;min-height:34px;margin-bottom:8px}
.sbox{background:white;border-radius:var(--r);border:1px solid var(--g2);padding:14px;margin-bottom:12px}
.sbox input[type=text],.sbox input[type=password]{width:100%;padding:10px 12px;border:1.5px solid var(--g2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:10px}
.sbox input:focus{border-color:var(--gx)}
.sbxbtn{width:100%;padding:11px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
.sbxbtn.g{background:var(--gx);color:white}
.sbxbtn.r{background:var(--rd);color:white}

/* TOAST */
.toast{position:fixed;bottom:18px;left:13px;right:13px;background:white;border-radius:var(--r);box-shadow:var(--shlg);padding:12px 13px;z-index:2000;display:none;max-width:480px;margin:0 auto}
.toast.on{display:flex;align-items:center;gap:10px;animation:tIn .25s ease}
@keyframes tIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.tico{font-size:22px;flex-shrink:0}
.tbody{flex:1}
.tt{font-weight:700;font-size:13px}
.tb{font-size:12px;color:var(--g4);margin-top:1px}
.tcl{font-size:18px;cursor:pointer;color:var(--g4)}

.fade-in{animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
</style>

</head>
<body>

<!-- ═══ PIN SCREEN ═══ -->

<div id="pin-screen">
  <img class="pin-logo" src="https://www.trafinoil.cz/dist/front/images/logo.svg" alt="Trafin Oil"
       onerror="this.style.display='none';document.getElementById('plf').style.display='block'">
  <div id="plf">TRAFIN OIL</div>
  <div class="pin-sub">Dispečink</div>
  <div class="pin-card" id="pin-card">
    <h2>Přihlášení</h2>
    <p>Výchozí PIN: 1234</p>
    <input type="password" id="pin-input" maxlength="4" inputmode="numeric" placeholder="••••" autocomplete="off">
    <button id="pin-submit">Přihlásit se →</button>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->

<div id="app">
  <div class="toast" id="toast">
    <div class="tico" id="tico">✅</div>
    <div class="tbody"><div class="tt" id="tt"></div><div class="tb" id="tb"></div></div>
    <div class="tcl" id="toast-close">✕</div>
  </div>

  <header>
    <div class="hinner">
      <img class="hlogo" src="https://www.trafinoil.cz/dist/front/images/logo.svg" alt="Trafin Oil"
           onerror="this.style.display='none';document.getElementById('hlfb').style.display='block'">
      <span id="hlfb">TRAFIN OIL</span>
      <div class="hright">
        <div class="htitle">Dispečink</div>
        <div class="hsync"><span class="sdot" id="sdot"></span><span id="slabel">Připojování…</span></div>
        <button id="logout-btn">Odhlásit</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tabw">
        <button class="tab active" data-page="pending"><span class="tab-icon">⏳</span>Čekající</button>
        <div class="tbadge" id="tbadge"></div>
      </div>
      <div class="tabw"><button class="tab" data-page="all"><span class="tab-icon">📋</span>Vše</button></div>
      <div class="tabw"><button class="tab" data-page="stats"><span class="tab-icon">📊</span>Přehled</button></div>
      <div class="tabw"><button class="tab" data-page="asett"><span class="tab-icon">⚙️</span>Nastavení</button></div>
    </div>
  </header>

  <div class="page active fade-in" id="page-pending">
    <div class="refbar">
      <span class="lref" id="lref">Real-time · Firebase</span>
      <button class="refbtn" id="refresh-btn"><span class="rspin" id="rspin">↻</span> Obnovit</button>
    </div>
    <div id="list-pending"></div>
  </div>

  <div class="page fade-in" id="page-all">
    <div class="searchbar"><span class="sicon">🔍</span><input type="text" id="q" placeholder="Hledat č. objednávky, provozovnu…"></div>
    <div class="fbar">
      <button class="fbtn active" data-filter="all">Vše</button>
      <button class="fbtn" data-filter="pending">⏳ Čekající</button>
      <button class="fbtn" data-filter="confirmed">✅ Potvrzené</button>
      <button class="fbtn" data-filter="rejected">❌ Odmítnuté</button>
      <button class="fbtn" data-filter="order">📦 Dodávky</button>
      <button class="fbtn" data-filter="pickup">🚛 Odvozy</button>
    </div>
    <div id="list-all"></div>
  </div>

  <div class="page fade-in" id="page-stats">
    <p class="slabel">Statistiky</p>
    <div class="stats-row">
      <div class="sc"><div class="sn" id="st-p" style="color:var(--am)">0</div><div class="sl">Čekající</div></div>
      <div class="sc"><div class="sn" id="st-c" style="color:var(--gx)">0</div><div class="sl">Potvrzené</div></div>
      <div class="sc"><div class="sn" id="st-r" style="color:var(--rd)">0</div><div class="sl">Odmítnuté</div></div>
    </div>
    <div class="stats-row" style="margin-top:10px">
      <div class="sc"><div class="sn" id="st-o" style="color:var(--bl)">0</div><div class="sl">Dodávky</div></div>
      <div class="sc"><div class="sn" id="st-pk" style="color:var(--am)">0</div><div class="sl">Odvozy</div></div>
      <div class="sc"><div class="sn" id="st-t" style="color:var(--gx)">0</div><div class="sl">Celkem</div></div>
    </div>
    <p class="slabel">Poslední aktivita</p>
    <div id="st-recent"></div>
  </div>

  <div class="page fade-in" id="page-asett">
    <p class="slabel">Řidiči</p>
    <div class="sbox">
      <div class="dwrap" id="dwrap"></div>
      <div style="display:flex;gap:8px">
        <input type="text" id="drv-inp" placeholder="Jméno řidiče" style="flex:1;padding:10px 12px;border:1.5px solid var(--g2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;outline:none">
        <button id="drv-add-btn" style="padding:10px 14px;background:var(--gx);color:white;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;cursor:pointer;flex-shrink:0">Přidat</button>
      </div>
    </div>
    <p class="slabel">Změna PINu</p>
    <div class="sbox">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--gm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Nový PIN (4 číslice)</label>
      <input type="password" id="new-pin" maxlength="4" placeholder="••••" style="text-align:center;letter-spacing:8px;font-size:20px">
      <button id="pin-change-btn" class="sbxbtn g">Uložit nový PIN</button>
    </div>
    <p class="slabel">Data</p>
    <div class="sbox">
      <p style="font-size:13px;color:var(--g4);margin-bottom:12px">Smazat všechny objednávky z Firebase. Nevratná akce.</p>
      <button id="clear-all-btn" class="sbxbtn r">🗑 Smazat všechna data</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ═══════════════════════════════
   FIREBASE
═══════════════════════════════ */
firebase.initializeApp({
  apiKey:            "AIzaSyAyMrivTrAfIk7XQIdDHubqN8oVgUALDRE",
  authDomain:        "trafinoil-gastro.firebaseapp.com",
  databaseURL:       "https://trafinoil-gastro-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "trafinoil-gastro",
  storageBucket:     "trafinoil-gastro.firebasestorage.app",
  messagingSenderId: "113292676903",
  appId:             "1:113292676903:web:bfe2aae4a100ee1fd26302"
});
const db        = firebase.database();
const ordersRef = db.ref('orders');

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let orders    = {};
let curFilter = 'all';
let drivers   = JSON.parse(localStorage.getItem('admin_drivers') || '["Jan Novák","Petra Svobodová","Tomáš Kříž"]');
let knownKeys = new Set();

/* ═══════════════════════════════
   UTILS
═══════════════════════════════ */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ft(d) {
  const p = n => String(n).padStart(2,'0');
  return p(d.getHours()) + ':' + p(d.getMinutes());
}

/* ═══════════════════════════════
   PIN
═══════════════════════════════ */
function getPin() { return localStorage.getItem('admin_pin') || '1234'; }

function checkPin() {
  const val = document.getElementById('pin-input').value.trim();
  if (val === getPin()) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').textContent = '';
    initApp();
  } else {
    document.getElementById('pin-error').textContent = 'Nesprávný PIN, zkuste znovu.';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
    const c = document.getElementById('pin-card');
    c.classList.remove('shake');
    void c.offsetWidth;
    c.classList.add('shake');
  }
}

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-input').focus();
}

/* ═══════════════════════════════
   INIT APP
═══════════════════════════════ */
function initApp() {
  renderDrivers();

  db.ref('.info/connected').on('value', snap => {
    const on = snap.val();
    document.getElementById('sdot').className = 'sdot ' + (on ? 'live' : 'offline');
    document.getElementById('slabel').textContent = on ? 'Real-time · Firebase' : 'Offline';
  });

  ordersRef.on('value', snap => {
    const data = snap.val() || {};
    Object.keys(data).forEach(k => {
      if (!knownKeys.has(k) && Object.keys(orders).length > 0) {
        setTimeout(() => {
          const card = document.getElementById('card-' + k);
          if (card) { card.classList.add('new-pulse'); setTimeout(() => card.classList.remove('new-pulse'), 700); }
        }, 100);
        showToast('ok', 'Nová objednávka', data[k].provozovna + ' · ' + data[k].vol);
      }
      knownKeys.add(k);
    });
    orders = data;
    document.getElementById('lref').textContent = 'Aktualizováno: ' + ft(new Date());
    updateBadge();
    renderPending();
    renderAll();
    renderStats();
  });
}

/* ═══════════════════════════════
   BADGE
═══════════════════════════════ */
function updateBadge() {
  const n = Object.values(orders).filter(o => (o.status || 'pending') === 'pending').length;
  const b = document.getElementById('tbadge');
  b.textContent = n || '';
  b.classList.toggle('on', n > 0);
}

/* ═══════════════════════════════
   RENDER
═══════════════════════════════ */
function badgeHtml(s) {
  if (s === 'confirmed') return `<span class="sbadge confirmed"><span class="bdot"></span>Potvrzeno</span>`;
  if (s === 'rejected')  return `<span class="sbadge rejected"><span class="bdot"></span>Odmítnuto</span>`;
  return `<span class="sbadge pending"><span class="bdot"></span>Čeká</span>`;
}

function cardHtml(fbKey, o) {
  const s    = o.status || 'pending';
  const isPu = o.type === 'pickup';
  const drOpts = drivers.map(d => `<option value="${esc(d)}" ${o.driver === d ? 'selected' : ''}>${esc(d)}</option>`).join('');

  let btns;
  if (s === 'pending') {
    btns = `<button class="abtn abtn-ok" data-key="${fbKey}" data-act="confirmed">✅ Potvrdit</button>
            <button class="abtn abtn-no" data-key="${fbKey}" data-act="rejected">❌ Odmítnout</button>`;
  } else if (s === 'confirmed') {
    btns = `<button class="abtn abtn-sv" data-key="${fbKey}" data-act="save">💾 Uložit</button>
            <button class="abtn abtn-no" data-key="${fbKey}" data-act="rejected">❌ Zrušit</button>`;
  } else {
    btns = `<button class="abtn abtn-ok" data-key="${fbKey}" data-act="confirmed">↩ Obnovit</button>
            <button class="abtn abtn-sv" data-key="${fbKey}" data-act="save">💾 Uložit</button>`;
  }

  return `<div class="ocard ${s}" id="card-${fbKey}">
    <div class="ohdr" data-toggle="${fbKey}">
      <div class="otype">${isPu ? '🚛' : '📦'}</div>
      <div class="oinfo">
        <div class="onum">${esc(o.num)}</div>
        <div class="oprov">${esc(o.provozovna || '–')}</div>
        <div class="odesc">${esc(o.desc || '')}</div>
        <div class="ometa">${esc(o.date || '')}${o.addr && o.addr !== '–' ? ' · ' + esc(o.addr) : ''}</div>
      </div>
      <div class="oright">
        <div class="ovol">${esc(o.vol || '')}</div>
        ${badgeHtml(s)}
        <span class="chev">▼</span>
      </div>
    </div>
    <div class="odetail">
      <div class="drow"><span class="dl">IČO</span><span class="dv">${esc(o.ico || '–')}</span></div>
      <div class="drow"><span class="dl">Telefon</span><span class="dv">${esc(o.phone || '–')}</span></div>
      ${o.note ? `<div class="drow"><span class="dl">Pozn. zákazníka</span><span class="dv">${esc(o.note)}</span></div>` : ''}
      ${(o.items || []).map(it => `<div class="drow"><span class="dl">${esc(it.name)}</span><span class="dv">${it.qty} l</span></div>`).join('')}
      ${o.driver    ? `<div class="drow"><span class="dl">Řidič</span><span class="dv">${esc(o.driver)}</span></div>` : ''}
      ${o.delivDate ? `<div class="drow"><span class="dl">Termín</span><span class="dv">${esc(o.delivDate)}</span></div>` : ''}
      ${o.adminNote ? `<div class="drow"><span class="dl">Vaše poznámka</span><span class="dv" style="color:var(--bl)">${esc(o.adminNote)}</span></div>` : ''}
      <div class="alabel">Zpracovat</div>
      <div class="frow"><select id="dr-${fbKey}"><option value="">– Přiřadit řidiče –</option>${drOpts}</select></div>
      <div class="frow"><input type="text" id="dt-${fbKey}" placeholder="Termín (28.3.2026)" value="${esc(o.delivDate || '')}"></div>
      <textarea class="fnote" id="nt-${fbKey}" placeholder="Poznámka pro zákazníka…">${esc(o.adminNote || '')}</textarea>

```
  <div class="abtns">${btns}</div>
</div>
```

  </div>`;
}

function ordersArr() {
return Object.entries(orders)
.map(([k, v]) => ({ fbKey: k, …v }))
.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}

function renderPending() {
const el   = document.getElementById(‘list-pending’);
const list = ordersArr().filter(o => (o.status || ‘pending’) === ‘pending’);
el.innerHTML = list.length
? list.map(o => cardHtml(o.fbKey, o)).join(’’)
: `<div class="empty"><div class="ei">🎉</div><p>Žádné čekající objednávky.<br>Vše zpracováno!</p></div>`;
}

function renderAll() {
const el  = document.getElementById(‘list-all’);
const q   = (document.getElementById(‘q’)?.value || ‘’).toLowerCase();
let list  = ordersArr();
if (curFilter === ‘pending’)   list = list.filter(o => (o.status || ‘pending’) === ‘pending’);
if (curFilter === ‘confirmed’) list = list.filter(o => o.status === ‘confirmed’);
if (curFilter === ‘rejected’)  list = list.filter(o => o.status === ‘rejected’);
if (curFilter === ‘order’)     list = list.filter(o => o.type === ‘order’);
if (curFilter === ‘pickup’)    list = list.filter(o => o.type === ‘pickup’);
if (q) list = list.filter(o => (o.num + o.provozovna + o.addr + o.ico + o.desc + ‘’).toLowerCase().includes(q));
el.innerHTML = list.length
? list.map(o => cardHtml(o.fbKey, o)).join(’’)
: `<div class="empty"><div class="ei">📭</div><p>Žádné záznamy.</p></div>`;
}

function renderStats() {
const all = ordersArr();
document.getElementById(‘st-p’).textContent  = all.filter(o => (o.status || ‘pending’) === ‘pending’).length;
document.getElementById(‘st-c’).textContent  = all.filter(o => o.status === ‘confirmed’).length;
document.getElementById(‘st-r’).textContent  = all.filter(o => o.status === ‘rejected’).length;
document.getElementById(‘st-o’).textContent  = all.filter(o => o.type === ‘order’).length;
document.getElementById(‘st-pk’).textContent = all.filter(o => o.type === ‘pickup’).length;
document.getElementById(‘st-t’).textContent  = all.length;
const rec = all.slice(0, 6);
document.getElementById(‘st-recent’).innerHTML = rec.length
? rec.map(o => ` <div style="background:white;border-radius:var(--r);border:1px solid var(--g2);padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px"> <div> <div style="font-size:13px;font-weight:600">${o.type === 'order' ? '📦' : '🚛'} ${esc(o.num)}</div> <div style="font-size:12px;color:var(--g4)">${esc(o.provozovna || '–')} · ${esc(o.date || '')}</div> </div> ${badgeHtml(o.status || 'pending')} </div>`).join(’’)
: `<div class="empty" style="padding:20px"><p>Žádná data.</p></div>`;
}

/* ═══════════════════════════════
ACTION na objednávce
═══════════════════════════════ */
function actOrder(fbKey, action) {
const driver    = document.getElementById(‘dr-’ + fbKey)?.value || ‘’;
const delivDate = document.getElementById(‘dt-’ + fbKey)?.value || ‘’;
const adminNote = document.getElementById(‘nt-’ + fbKey)?.value || ‘’;
const cur       = orders[fbKey];
const ns        = action === ‘save’ ? (cur?.status || ‘pending’) : action;

ordersRef.child(fbKey).update({ status: ns, driver, delivDate, adminNote, updatedAt: new Date().toISOString() })
.then(() => {
if (action === ‘confirmed’) showToast(‘ok’, ‘Potvrzeno’, `${cur?.num || ''}${driver ? ' · ' + driver : ''}${delivDate ? ' · ' + delivDate : ''}`);
else if (action === ‘rejected’) showToast(‘warn’, ‘Odmítnuto’, cur?.num || ‘’);
else showToast(‘ok’, ‘Uloženo’, cur?.num || ‘’);
document.getElementById(‘card-’ + fbKey)?.classList.remove(‘expanded’);
})
.catch(err => showToast(‘error’, ‘Chyba’, err.message));
}

/* ═══════════════════════════════
DRIVERS
═══════════════════════════════ */
function renderDrivers() {
document.getElementById(‘dwrap’).innerHTML = drivers.length
? drivers.map((d, i) => `<div class="dchip">🚚 ${esc(d)}<span class="rm" data-di="${i}">✕</span></div>`).join(’’)
: `<span style="font-size:13px;color:var(--g4)">Žádní řidiči.</span>`;
}

/* ═══════════════════════════════
TOAST
═══════════════════════════════ */
let tTimer;
function showToast(type, title, sub) {
clearTimeout(tTimer);
document.getElementById(‘tico’).textContent = { ok: ‘✅’, warn: ‘⚠️’, error: ‘❌’ }[type] || ‘✅’;
document.getElementById(‘tt’).textContent   = title;
document.getElementById(‘tb’).textContent   = sub || ‘’;
document.getElementById(‘toast’).classList.add(‘on’);
tTimer = setTimeout(() => document.getElementById(‘toast’).classList.remove(‘on’), 4000);
}

/* ═══════════════════════════════
NAVIGATION
═══════════════════════════════ */
function showPage(id) {
document.querySelectorAll(’.page’).forEach(p => p.classList.remove(‘active’));
document.querySelectorAll(’.tab’).forEach(t => t.classList.remove(‘active’));
document.getElementById(‘page-’ + id).classList.add(‘active’);
document.querySelector(`.tab[data-page="${id}"]`)?.classList.add(‘active’);
}

/* ═══════════════════════════════
GLOBAL EVENT DELEGATION
– žádné inline handlery, vše zde
═══════════════════════════════ */
document.addEventListener(‘DOMContentLoaded’, () => {

// Automaticky zaměří PIN input
document.getElementById(‘pin-input’).focus();

// PIN – submit button
document.getElementById(‘pin-submit’).addEventListener(‘click’, checkPin);

// PIN – Enter key
document.getElementById(‘pin-input’).addEventListener(‘keydown’, e => {
if (e.key === ‘Enter’) checkPin();
});

// PIN – auto submit po 4 číslicích
document.getElementById(‘pin-input’).addEventListener(‘input’, function() {
this.value = this.value.replace(/[^0-9]/g, ‘’);
if (this.value.length === 4) setTimeout(checkPin, 200);
});

// Logout
document.getElementById(‘logout-btn’).addEventListener(‘click’, logout);

// Tabs
document.querySelectorAll(’.tab’).forEach(btn => {
btn.addEventListener(‘click’, () => showPage(btn.dataset.page));
});

// Filter buttons
document.querySelectorAll(’.fbtn’).forEach(btn => {
btn.addEventListener(‘click’, () => {
curFilter = btn.dataset.filter;
document.querySelectorAll(’.fbtn’).forEach(b => b.classList.remove(‘active’));
btn.classList.add(‘active’);
renderAll();
});
});

// Search
document.getElementById(‘q’).addEventListener(‘input’, renderAll);

// Refresh button
document.getElementById(‘refresh-btn’).addEventListener(‘click’, () => {
const s = document.getElementById(‘rspin’);
s.classList.add(‘go’); setTimeout(() => s.classList.remove(‘go’), 500);
showToast(‘ok’, ‘Připojeno’, ‘Data jsou aktuální v reálném čase.’);
});

// Toast close
document.getElementById(‘toast-close’).addEventListener(‘click’, () => {
document.getElementById(‘toast’).classList.remove(‘on’);
});

// PIN změna
document.getElementById(‘pin-change-btn’).addEventListener(‘click’, () => {
const v = (document.getElementById(‘new-pin’).value || ‘’).trim();
if (!/^\d{4}$/.test(v)) { showToast(‘error’, ‘Chyba’, ‘PIN musí mít přesně 4 číslice.’); return; }
localStorage.setItem(‘admin_pin’, v);
document.getElementById(‘new-pin’).value = ‘’;
showToast(‘ok’, ‘PIN změněn’, ‘Nový PIN byl uložen.’);
});

// Přidat řidiče
document.getElementById(‘drv-add-btn’).addEventListener(‘click’, () => {
const inp = document.getElementById(‘drv-inp’);
const v   = inp.value.trim();
if (!v || drivers.includes(v)) return;
drivers.push(v); inp.value = ‘’;
localStorage.setItem(‘admin_drivers’, JSON.stringify(drivers));
renderDrivers();
});

// Enter v poli řidiče
document.getElementById(‘drv-inp’).addEventListener(‘keydown’, e => {
if (e.key === ‘Enter’) document.getElementById(‘drv-add-btn’).click();
});

// Smazat vše
document.getElementById(‘clear-all-btn’).addEventListener(‘click’, () => {
if (!confirm(‘Opravdu smazat všechny objednávky z Firebase?’)) return;
ordersRef.remove().then(() => showToast(‘ok’, ‘Smazáno’, ‘Všechny objednávky odstraněny.’));
});

// Event delegation – karty, akce, toggle, smazat řidiče
document.addEventListener(‘click’, e => {

```
// Toggle karty (rozbalit/sbalit)
const hdr = e.target.closest('[data-toggle]');
if (hdr) {
  document.getElementById('card-' + hdr.dataset.toggle)?.classList.toggle('expanded');
  return;
}

// Akční tlačítka na kartách
const abtn = e.target.closest('.abtn[data-key]');
if (abtn) {
  actOrder(abtn.dataset.key, abtn.dataset.act);
  return;
}

// Smazat řidiče
const rm = e.target.closest('.rm[data-di]');
if (rm) {
  drivers.splice(parseInt(rm.dataset.di), 1);
  localStorage.setItem('admin_drivers', JSON.stringify(drivers));
  renderDrivers();
}
```

});
});
</script>
