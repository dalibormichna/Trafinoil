<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f3d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Trafin Admin">
<title>Trafin Oil – Dispečink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --green-dark:   #0f3d0f;
    --green-main:   #1a5c1a;
    --green-mid:    #2a7a2a;
    --green-accent: #4caf50;
    --green-pale:   #e8f5e9;
    --amber:        #f59e0b;
    --amber-pale:   #fff8e1;
    --red:          #dc2626;
    --red-pale:     #fee2e2;
    --blue:         #2563eb;
    --blue-pale:    #eff6ff;
    --surface:      #f4f7f4;
    --gray-100:     #eef2ee;
    --gray-200:     #d8e4d8;
    --gray-400:     #7a987a;
    --gray-600:     #3d5c3d;
    --gray-800:     #162016;
    --shadow-sm:    0 1px 4px rgba(0,0,0,.10);
    --shadow-md:    0 4px 16px rgba(0,0,0,.13);
    --shadow-lg:    0 8px 32px rgba(0,0,0,.18);
    --radius:       12px;
    --radius-lg:    20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family:'Barlow',sans-serif; background:var(--surface); color:var(--gray-800); min-height:100vh; overflow-x:hidden; }

  /* ─── PIN SCREEN ─── */
  #pin-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh;
    background:linear-gradient(160deg,var(--green-dark) 0%,var(--green-main) 50%,var(--green-mid) 100%);
    padding:32px 24px;
  }
  .pin-logo    { height:48px; filter:brightness(0) invert(1); margin-bottom:6px; }
  .pin-logo-fb { display:none; font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:700; color:white; letter-spacing:2px; margin-bottom:6px; }
  .pin-sub     { font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:34px; }

  .pin-card { background:white; border-radius:var(--radius-lg); padding:26px 22px; width:100%; max-width:310px; box-shadow:var(--shadow-lg); }
  .pin-card h2 { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:1px; text-align:center; color:var(--green-main); text-transform:uppercase; margin-bottom:4px; }
  .pin-card p  { font-size:13px; color:var(--gray-400); text-align:center; margin-bottom:20px; }

  .pin-dots { display:flex; justify-content:center; gap:16px; margin-bottom:20px; }
  .pin-dot  { width:15px; height:15px; border-radius:50%; border:2.5px solid var(--gray-200); background:transparent; transition:all .18s; }
  .pin-dot.filled { background:var(--green-main); border-color:var(--green-main); transform:scale(1.2); }

  .pin-keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pin-key {
    padding:15px 8px; border:none; border-radius:10px;
    background:var(--gray-100); color:var(--gray-800);
    font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:700;
    cursor:pointer; transition:background .1s,transform .1s;
    user-select:none; text-align:center; touch-action:manipulation;
    -webkit-user-select:none;
  }
  .pin-key:hover  { background:#ddeedd; }
  .pin-key:active { background:var(--green-pale); transform:scale(.90); }
  .pin-key.del    { font-size:17px; background:var(--red-pale); color:var(--red); }
  .pin-key.del:active { background:#fca5a5; }
  .pin-key.empty  { background:transparent; pointer-events:none; }
  .pin-error { text-align:center; color:var(--red); font-size:13px; font-weight:600; margin-top:14px; min-height:18px; }

  @keyframes shake { 0%,100%{transform:none} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  .shake { animation:shake .35s ease; }

  /* ─── MAIN APP ─── */
  #app { display:none; padding-bottom:80px; }

  header { background:linear-gradient(135deg,var(--green-dark),var(--green-main)); color:white; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,.28); }
  .hinner { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; }
  .hlogo  { height:30px; filter:brightness(0) invert(1); }
  .hlogo-fb { display:none; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; color:white; letter-spacing:1px; }
  .hright { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .htitle { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
  .hsub   { font-size:11px; opacity:.6; display:flex; align-items:center; gap:4px; }
  .sdot   { width:6px; height:6px; border-radius:50%; background:#4caf50; animation:sp 2s infinite; }
  @keyframes sp{0%,100%{opacity:1}50%{opacity:.3}}
  .logout-btn { margin-top:3px; background:rgba(255,255,255,.14); border:none; color:white; padding:4px 10px; border-radius:6px; font-size:11px; font-family:'Barlow Condensed',sans-serif; font-weight:700; cursor:pointer; }

  .tabs { display:flex; background:var(--green-dark); border-top:1px solid rgba(255,255,255,.1); }
  .tabw { position:relative; flex:1; }
  .tab  { display:block; width:100%; padding:9px 0; text-align:center; color:rgba(255,255,255,.55); font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; user-select:none; border:none; background:none; }
  .tab.active { color:white; border-bottom:3px solid var(--green-accent); background:rgba(255,255,255,.06); }
  .tab-icon { font-size:17px; display:block; margin-bottom:1px; }
  .tbadge { position:absolute; top:5px; right:calc(50% - 20px); background:var(--red); color:white; font-size:10px; font-weight:700; border-radius:10px; padding:1px 6px; display:none; pointer-events:none; }
  .tbadge.on { display:block; }

  .page { display:none; padding:14px; }
  .page.active { display:block; }

  .slabel { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--green-main); margin-bottom:10px; margin-top:20px; }
  .slabel:first-child { margin-top:0; }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .scard { background:white; border-radius:var(--radius); padding:12px; text-align:center; box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); }
  .snum  { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:700; line-height:1; }
  .slbl  { font-size:10px; color:var(--gray-400); margin-top:4px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }

  /* ORDER CARD */
  .ocard { background:white; border-radius:var(--radius); box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); border-left-width:4px; margin-bottom:10px; overflow:hidden; }
  .ocard.pending   { border-left-color:var(--amber); }
  .ocard.confirmed { border-left-color:var(--green-accent); }
  .ocard.rejected  { border-left-color:var(--red); }

  .ohdr { padding:12px 13px; display:flex; align-items:flex-start; gap:10px; cursor:pointer; user-select:none; }
  .otype { font-size:22px; flex-shrink:0; }
  .oinfo { flex:1; min-width:0; }
  .onum  { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; color:var(--green-main); }
  .oprov { font-weight:600; font-size:14px; margin-top:1px; }
  .odesc { font-size:12px; color:var(--gray-400); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ometa { font-size:11px; color:var(--gray-400); margin-top:2px; }
  .oright { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
  .ovol   { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; }
  .chev   { font-size:11px; color:var(--gray-400); transition:transform .2s; }
  .ocard.expanded .chev { transform:rotate(180deg); }

  .sbadge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; }
  .sbadge.pending   { background:var(--amber-pale); color:#92400e; }
  .sbadge.confirmed { background:var(--green-pale); color:var(--green-main); }
  .sbadge.rejected  { background:var(--red-pale); color:var(--red); }
  .bdot { width:6px; height:6px; border-radius:50%; background:currentColor; }
  .sbadge.pending .bdot { animation:pdot 1.3s infinite; }
  @keyframes pdot{0%,100%{opacity:1}50%{opacity:.2}}

  .odetail { display:none; padding:0 13px 13px; border-top:1px solid var(--gray-100); }
  .ocard.expanded .odetail { display:block; }
  .drow { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px solid var(--gray-100); gap:8px; }
  .drow:last-child { border-bottom:none; }
  .dl { color:var(--gray-400); flex-shrink:0; }
  .dv { font-weight:600; text-align:right; }

  .alabel { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--green-main); margin:13px 0 8px; }
  .frow { display:flex; gap:8px; margin-bottom:8px; }
  .frow input, .frow select {
    flex:1; padding:9px 11px; border:1.5px solid var(--gray-200); border-radius:8px;
    font-family:'Barlow',sans-serif; font-size:13px; color:var(--gray-800);
    background:white; outline:none; transition:border-color .2s;
  }
  .frow input:focus, .frow select:focus { border-color:var(--green-mid); }
  .fnote { width:100%; padding:9px 11px; border:1.5px solid var(--gray-200); border-radius:8px; font-family:'Barlow',sans-serif; font-size:13px; color:var(--gray-800); background:white; outline:none; resize:none; height:60px; margin-bottom:8px; transition:border-color .2s; display:block; }
  .fnote:focus { border-color:var(--green-mid); }

  .abtns { display:flex; gap:8px; }
  .abtn { flex:1; padding:11px 6px; border:none; border-radius:9px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; letter-spacing:.5px; cursor:pointer; transition:all .15s; text-align:center; user-select:none; }
  .abtn:active { transform:scale(.94); }
  .abtn-ok  { background:var(--green-accent); color:white; }
  .abtn-no  { background:var(--red); color:white; }
  .abtn-sv  { background:var(--blue); color:white; }

  /* FILTER */
  .fbar { display:flex; gap:7px; margin-bottom:12px; overflow-x:auto; padding-bottom:2px; }
  .fbtn { padding:7px 13px; border-radius:20px; border:1.5px solid var(--gray-200); background:white; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; color:var(--gray-600); transition:all .18s; }
  .fbtn.active { background:var(--green-main); color:white; border-color:var(--green-main); }

  /* SEARCH */
  .searchbar { position:relative; margin-bottom:12px; }
  .searchbar input { width:100%; padding:10px 13px 10px 35px; border:1.5px solid var(--gray-200); border-radius:var(--radius); font-family:'Barlow',sans-serif; font-size:14px; background:white; outline:none; transition:border-color .2s; }
  .searchbar input:focus { border-color:var(--green-mid); }
  .sicon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }

  /* REFRESH */
  .refbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .refbtn { display:flex; align-items:center; gap:5px; padding:7px 12px; background:white; border:1.5px solid var(--gray-200); border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.5px; cursor:pointer; color:var(--green-main); }
  .refbtn:active { background:var(--green-pale); }
  .rspin { display:inline-block; transition:transform .5s; }
  .rspin.go { transform:rotate(360deg); }
  .lref { font-size:11px; color:var(--gray-400); }

  /* EMPTY */
  .empty { text-align:center; padding:44px 20px; color:var(--gray-400); }
  .empty .ei { font-size:48px; margin-bottom:12px; }
  .empty p { font-size:14px; line-height:1.6; }

  /* DRIVER CHIPS */
  .dchip { display:inline-flex; align-items:center; gap:5px; background:var(--green-pale); border:1px solid var(--green-accent); border-radius:20px; padding:4px 10px; font-size:13px; font-weight:600; margin:3px; }
  .dchip .rm { cursor:pointer; color:var(--red); font-size:14px; font-weight:700; line-height:1; }
  .dwrap { display:flex; flex-wrap:wrap; min-height:34px; margin-bottom:8px; }

  /* SETTINGS BOX */
  .sbox { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); padding:14px; margin-bottom:12px; }
  .sbox input[type=text], .sbox input[type=password] { width:100%; padding:10px 12px; border:1.5px solid var(--gray-200); border-radius:8px; font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color .2s; margin-bottom:10px; }
  .sbox input:focus { border-color:var(--green-mid); }
  .sbxbtn { width:100%; padding:11px; border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; cursor:pointer; }
  .sbxbtn.g { background:var(--green-mid); color:white; }
  .sbxbtn.r { background:var(--red); color:white; }

  /* TOAST */
  .toast { position:fixed; bottom:18px; left:13px; right:13px; background:white; border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:12px 13px; z-index:2000; display:none; max-width:480px; margin:0 auto; }
  .toast.on { display:flex; align-items:center; gap:10px; animation:tIn .25s ease; }
  @keyframes tIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .tico { font-size:22px; flex-shrink:0; }
  .tbody { flex:1; }
  .tt { font-weight:700; font-size:13px; }
  .tb { font-size:12px; color:var(--gray-400); margin-top:1px; }
  .tcl { font-size:18px; cursor:pointer; color:var(--gray-400); }

  .fade-in { animation:fadeIn .3s ease both; }
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
</style>

</head>

<p class="slabel">Změna PINu</p>

<script>
/* ═══════════════════════════════════════
   STORAGE – localStorage + BroadcastChannel
   Stejný klíč jako v zákaznické appce
═══════════════════════════════════════ */
const LS = 'trafinoil:orders';

function lsRead()  {
  try { return JSON.parse(localStorage.getItem(LS) || '[]'); } catch { return []; }
}
function lsWrite(arr) {
  localStorage.setItem(LS, JSON.stringify(arr));
  try { bc.postMessage('update'); } catch {}
}
function lsPatch(num, patch) {
  const arr = lsRead();
  const i = arr.findIndex(o => o.num === num);
  if (i < 0) return null;
  Object.assign(arr[i], patch);
  lsWrite(arr);
  return arr[i];
}

let bc;
try {
  bc = new BroadcastChannel('trafinoil');
  bc.onmessage = () => { load(); renderAll(); renderPending(); renderStats(); };
} catch { bc = { postMessage(){} }; }

/* ═══════════════════════════════════════
   PIN
═══════════════════════════════════════ */
const DEF_PIN = '1234';
let buf = '';

function getPin() { return localStorage.getItem('admin_pin') || DEF_PIN; }

function pinPress(d) {
  if (buf.length >= 4) return;
  buf += d;
  dots();
  if (buf.length === 4) setTimeout(checkPin, 150);
}

function pinDel() {
  buf = buf.slice(0, -1);
  dots();
  document.getElementById('pin-error').textContent = '';
}

function dots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d' + i).classList.toggle('filled', i < buf.length);
}

function checkPin() {
  if (buf === getPin()) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pin-error').textContent = 'Nesprávný PIN, zkuste znovu.';
    buf = ''; dots();
    const c = document.getElementById('pin-card');
    c.classList.remove('shake');
    void c.offsetWidth;
    c.classList.add('shake');
  }
}

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  buf = ''; dots();
  document.getElementById('pin-error').textContent = '';
}

function changePin() {
  const v = (document.getElementById('new-pin').value || '').trim();
  if (!/^\d{4}$/.test(v)) { toast('error','Chyba','PIN musí mít přesně 4 číslice.'); return; }
  localStorage.setItem('admin_pin', v);
  document.getElementById('new-pin').value = '';
  toast('ok','PIN změněn','Nový PIN byl uložen.');
}

// Keyboard support pro PIN
document.addEventListener('keydown', e => {
  if (document.getElementById('pin-screen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinDel();
});

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
let orders = [];
let filter = 'all';
let drivers = JSON.parse(localStorage.getItem('admin_drivers') ||
  '["Jan Novák","Petra Svobodová","Tomáš Kříž"]');

function initApp() {
  load();
  renderPending(); renderAll(); renderStats(); renderDrivers();
  document.getElementById('htime').textContent = ft(new Date());
  setInterval(() => { load(); renderPending(); renderAll(); renderStats(); }, 10000);
}

function load() {
  orders = lsRead();
  badge();
  document.getElementById('lref').textContent = 'Aktualizováno: ' + ft(new Date());
}

function badge() {
  const n = orders.filter(o => (o.status||'pending') === 'pending').length;
  const b = document.getElementById('tbadge');
  b.textContent = n || '';
  b.classList.toggle('on', n > 0);
}

function doRefresh() {
  const s = document.getElementById('rspin');
  s.classList.add('go'); setTimeout(() => s.classList.remove('go'), 500);
  load(); renderPending(); renderAll(); renderStats();
  toast('ok','Obnoveno','Data jsou aktuální.');
}

/* ═══════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════ */
function h(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function badgeHtml(s) {
  if (s==='confirmed') return `<span class="sbadge confirmed"><span class="bdot"></span>Potvrzeno</span>`;
  if (s==='rejected')  return `<span class="sbadge rejected"><span class="bdot"></span>Odmítnuto</span>`;
  return `<span class="sbadge pending"><span class="bdot"></span>Čeká</span>`;
}

function cardHtml(o) {
  const s = o.status || 'pending';
  const isPu = o.type === 'pickup';
  const drOpts = drivers.map(d =>
    `<option value="${h(d)}" ${o.driver===d?'selected':''}>${h(d)}</option>`).join('');

  let actionBtns = '';
  if (s === 'pending') {
    actionBtns = `
      <button type="button" class="abtn abtn-ok" onclick="act('${o.num}','confirmed')">✅ Potvrdit</button>
      <button type="button" class="abtn abtn-no" onclick="act('${o.num}','rejected')">❌ Odmítnout</button>`;
  } else if (s === 'confirmed') {
    actionBtns = `
      <button type="button" class="abtn abtn-sv" onclick="act('${o.num}','save')">💾 Uložit</button>
      <button type="button" class="abtn abtn-no" onclick="act('${o.num}','rejected')">❌ Zrušit</button>`;
  } else {
    actionBtns = `
      <button type="button" class="abtn abtn-ok" onclick="act('${o.num}','confirmed')">↩ Obnovit</button>
      <button type="button" class="abtn abtn-sv" onclick="act('${o.num}','save')">💾 Uložit</button>`;
  }

  return `<div class="ocard ${s}" id="card-${o.num}">
    <div class="ohdr" onclick="toggle('${o.num}')">
      <div class="otype">${isPu?'🚛':'📦'}</div>
      <div class="oinfo">
        <div class="onum">${h(o.num)}</div>
        <div class="oprov">${h(o.provozovna||'–')}</div>
        <div class="odesc">${h(o.desc||'')}</div>
        <div class="ometa">${h(o.date||'')}${o.addr&&o.addr!=='–'?' · '+h(o.addr):''}</div>
      </div>
      <div class="oright">
        <div class="ovol">${h(o.vol||'')}</div>
        ${badgeHtml(s)}
        <span class="chev">▼</span>
      </div>
    </div>
    <div class="odetail">
      <div class="drow"><span class="dl">IČO</span><span class="dv">${h(o.ico||'–')}</span></div>
      <div class="drow"><span class="dl">Telefon</span><span class="dv">${h(o.phone||'–')}</span></div>
      ${o.note?`<div class="drow"><span class="dl">Pozn. zákazníka</span><span class="dv">${h(o.note)}</span></div>`:''}
      ${(o.items||[]).map(it=>`<div class="drow"><span class="dl">${h(it.name)}</span><span class="dv">${it.qty} l</span></div>`).join('')}
      ${o.driver?`<div class="drow"><span class="dl">Řidič</span><span class="dv">${h(o.driver)}</span></div>`:''}
      ${o.delivDate?`<div class="drow"><span class="dl">Termín</span><span class="dv">${h(o.delivDate)}</span></div>`:''}
      ${o.adminNote?`<div class="drow"><span class="dl">Vaše poznámka</span><span class="dv" style="color:var(--blue)">${h(o.adminNote)}</span></div>`:''}

      <div class="alabel">Zpracovat</div>
      <div class="frow">
        <select id="dr-${o.num}">
          <option value="">– Přiřadit řidiče –</option>${drOpts}
        </select>
      </div>
      <div class="frow">
        <input type="text" id="dt-${o.num}" placeholder="Termín (28.3.2026)" value="${h(o.delivDate||'')}">
      </div>
      <textarea class="fnote" id="nt-${o.num}" placeholder="Poznámka pro zákazníka…">${h(o.adminNote||'')}</textarea>

```
  <div class="abtns">${actionBtns}</div>
</div>
```

  </div>`;
}

function renderPending() {
const el = document.getElementById(‘list-pending’);
const list = orders.filter(o => (o.status||‘pending’) === ‘pending’);
el.innerHTML = list.length ? list.map(cardHtml).join(’’) :
`<div class="empty"><div class="ei">🎉</div><p>Žádné čekající objednávky.<br>Vše zpracováno!</p></div>`;
}

function renderAll() {
const el = document.getElementById(‘list-all’);
const q = (document.getElementById(‘q’)?.value||’’).toLowerCase();
let list = […orders];
if (filter===‘pending’)   list=list.filter(o=>(o.status||‘pending’)===‘pending’);
if (filter===‘confirmed’) list=list.filter(o=>o.status===‘confirmed’);
if (filter===‘rejected’)  list=list.filter(o=>o.status===‘rejected’);
if (filter===‘order’)     list=list.filter(o=>o.type===‘order’);
if (filter===‘pickup’)    list=list.filter(o=>o.type===‘pickup’);
if (q) list=list.filter(o=>(o.num+o.provozovna+o.addr+o.ico+o.desc+’’).toLowerCase().includes(q));
el.innerHTML = list.length ? list.map(cardHtml).join(’’) :
`<div class="empty"><div class="ei">📭</div><p>Žádné záznamy neodpovídají filtru.</p></div>`;
}

function renderStats() {
const p  = orders.filter(o=>(o.status||‘pending’)===‘pending’).length;
const c  = orders.filter(o=>o.status===‘confirmed’).length;
const r  = orders.filter(o=>o.status===‘rejected’).length;
const or = orders.filter(o=>o.type===‘order’).length;
const pk = orders.filter(o=>o.type===‘pickup’).length;
document.getElementById(‘st-p’).textContent  = p;
document.getElementById(‘st-c’).textContent  = c;
document.getElementById(‘st-r’).textContent  = r;
document.getElementById(‘st-o’).textContent  = or;
document.getElementById(‘st-pk’).textContent = pk;
document.getElementById(‘st-t’).textContent  = orders.length;
const rec = orders.slice(0,6);
document.getElementById(‘st-recent’).innerHTML = rec.length ? rec.map(o=>` <div style="background:white;border-radius:var(--radius);border:1px solid var(--gray-200);padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px"> <div> <div style="font-size:13px;font-weight:600">${o.type==='order'?'📦':'🚛'} ${h(o.num)}</div> <div style="font-size:12px;color:var(--gray-400)">${h(o.provozovna||'–')} · ${h(o.date||'')}</div> </div> ${badgeHtml(o.status||'pending')} </div>`).join(’’) :
`<div class="empty" style="padding:20px"><p>Žádná data.</p></div>`;
}

/* ═══════════════════════════════════════
ACTIONS
═══════════════════════════════════════ */
function act(num, action) {
const driver    = document.getElementById(‘dr-’+num)?.value || ‘’;
const delivDate = document.getElementById(‘dt-’+num)?.value || ‘’;
const adminNote = document.getElementById(‘nt-’+num)?.value || ‘’;
const cur = orders.find(o=>o.num===num);
const ns  = action===‘save’ ? (cur?.status||‘pending’) : action;
const patch = { status:ns, driver, delivDate, adminNote, updatedAt:fd(new Date()) };
lsPatch(num, patch);
load(); renderPending(); renderAll(); renderStats();
if (action===‘confirmed’) toast(‘ok’,‘Potvrzeno’,`${num}${driver?' · '+driver:''}${delivDate?' · '+delivDate:''}`);
else if (action===‘rejected’) toast(‘warn’,‘Odmítnuto’,num);
else toast(‘ok’,‘Uloženo’,num);
document.getElementById(‘card-’+num)?.classList.remove(‘expanded’);
}

/* ═══════════════════════════════════════
MISC
═══════════════════════════════════════ */
function toggle(num) { document.getElementById(‘card-’+num)?.classList.toggle(‘expanded’); }

function showPage(id) {
document.querySelectorAll(’.page’).forEach(p=>p.classList.remove(‘active’));
document.querySelectorAll(’.tab’).forEach(t=>t.classList.remove(‘active’));
document.getElementById(‘page-’+id).classList.add(‘active’);
document.getElementById(‘tab-’+id).classList.add(‘active’);
}

function setFilter(f, btn) {
filter = f;
document.querySelectorAll(’.fbtn’).forEach(b=>b.classList.remove(‘active’));
btn.classList.add(‘active’);
renderAll();
}

/* Drivers */
function renderDrivers() {
document.getElementById(‘dwrap’).innerHTML = drivers.length
? drivers.map((d,i)=>`<div class="dchip">🚚 ${h(d)}<span class="rm" onclick="removeDriver(${i})">✕</span></div>`).join(’’)
: `<span style="font-size:13px;color:var(--gray-400)">Žádní řidiči.</span>`;
}
function addDriver() {
const inp = document.getElementById(‘drv-inp’);
const v = inp.value.trim();
if (!v || drivers.includes(v)) return;
drivers.push(v); inp.value = ‘’;
localStorage.setItem(‘admin_drivers’, JSON.stringify(drivers));
renderDrivers();
}
function removeDriver(i) {
drivers.splice(i,1);
localStorage.setItem(‘admin_drivers’, JSON.stringify(drivers));
renderDrivers();
}
function clearAll() {
if (!confirm(‘Opravdu smazat všechny objednávky?’)) return;
lsWrite([]);
orders = [];
renderPending(); renderAll(); renderStats(); badge();
toast(‘ok’,‘Smazáno’,‘Všechny objednávky odstraněny.’);
}

/* Toast */
let tTimer;
function toast(type, title, sub) {
clearTimeout(tTimer);
document.getElementById(‘tico’).textContent = {ok:‘✅’,warn:‘⚠️’,error:‘❌’}[type]||‘✅’;
document.getElementById(‘tt’).textContent = title;
document.getElementById(‘tb’).textContent = sub||’’;
const t = document.getElementById(‘toast’);
t.classList.add(‘on’);
tTimer = setTimeout(()=>t.classList.remove(‘on’), 4000);
}
function closeToast() { document.getElementById(‘toast’).classList.remove(‘on’); }

/* Utils */
function fd(d){ const p=n=>String(n).padStart(2,‘0’); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function ft(d){ const p=n=>String(n).padStart(2,‘0’); return `${p(d.getHours())}:${p(d.getMinutes())}`; }
</script>
